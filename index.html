<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Reverse Trailer Parking</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        background: #1a1a1a;
      }

      #app {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      #game-root {
        position: absolute;
        inset: 0;
      }

      #game-root canvas {
        display: block;
      }

      #controls-root {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #controls-root > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-root"></div>
      <div id="controls-root"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
